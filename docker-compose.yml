version: '3.8'
services:
  # Cấu hình cho Database MySQL
  db:
    image: mysql:8.0
    container_name: finance-mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: personal_finance
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # Công cụ quản lý DB qua trình duyệt (Tùy chọn - rất tiện lợi)
  adminer:
    image: adminer
    restart: always
    ports:
      - "8888:8080"

volumes:
  db_data: